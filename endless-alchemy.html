<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Endless Alchemy ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a12;
    --panel: #10101e;
    --card: #16162a;
    --card-hover: #1e1e38;
    --border: #2a2a4a;
    --border-glow: #5b4fcf;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --gold: #f5c842;
    --text: #e8e0ff;
    --muted: #7a7a9a;
    --new-badge: #2a4a2a;
    --new-text: #7fff7f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Raleway', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(92,74,220,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(247,162,106,0.06) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1.4rem;
    background: rgba(16,16,30,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    z-index: 100;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.25rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
  }
  .header-info {
    display: flex;
    gap: 1.2rem;
    align-items: center;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .stat { display: flex; align-items: center; gap: 0.35rem; }
  .stat span { color: var(--text); font-weight: 600; }
  .reset-btn {
    padding: 0.35rem 0.85rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'Raleway', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #e05555; color: #e05555; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .sidebar-header .count {
    background: var(--border-glow);
    color: #fff;
    padding: 1px 7px;
    border-radius: 20px;
    font-size: 0.7rem;
  }
  .sidebar-search {
    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-search input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.35rem 0.65rem;
    color: var(--text);
    font-size: 0.8rem;
    font-family: 'Raleway', sans-serif;
    outline: none;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .elements-list {
    overflow-y: auto;
    flex: 1;
    padding: 0.5rem;
  }
  .elements-list::-webkit-scrollbar { width: 4px; }
  .elements-list::-webkit-scrollbar-track { background: transparent; }
  .elements-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .element-chip {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 0.7rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: grab;
    user-select: none;
    font-size: 0.82rem;
    margin-bottom: 0.35rem;
    transition: all 0.12s;
    position: relative;
  }
  .element-chip:hover {
    border-color: var(--accent);
    background: var(--card-hover);
    transform: translateX(2px);
  }
  .element-chip.new-item {
    border-color: #3a6a3a;
    background: var(--new-badge);
  }
  .new-badge {
    position: absolute;
    right: 5px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.58rem;
    color: var(--new-text);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .element-chip .emoji { font-size: 1rem; line-height: 1; }
  .element-chip .label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #canvas {
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* ── CANVAS ELEMENTS ── */
  .canvas-item {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.55rem 0.9rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: grab;
    user-select: none;
    font-size: 0.88rem;
    min-width: 100px;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: border-color 0.12s, box-shadow 0.12s;
    z-index: 10;
  }
  .canvas-item:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(124,106,247,0.25);
    z-index: 20;
  }
  .canvas-item.dragging {
    cursor: grabbing;
    z-index: 1000;
    box-shadow: 0 8px 30px rgba(124,106,247,0.5);
    border-color: var(--accent);
  }
  .canvas-item.combining {
    animation: pulse 0.5s ease-in-out;
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(245,200,66,0.5);
  }
  .canvas-item .c-emoji { font-size: 1.1rem; }
  .canvas-item .c-delete {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: all 0.1s;
    flex-shrink: 0;
  }
  .canvas-item:hover .c-delete {
    opacity: 1;
    border-color: #e05555;
    color: #e05555;
  }

  /* ── COMBINE ZONE ── */
  .combine-zone {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(16,16,30,0.92);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0.9rem 1.4rem;
    backdrop-filter: blur(12px);
    transition: border-color 0.2s, box-shadow 0.2s;
    z-index: 50;
  }
  .combine-zone.ready {
    border-color: var(--gold);
    box-shadow: 0 0 24px rgba(245,200,66,0.3);
  }
  .combine-slot {
    width: 130px;
    height: 46px;
    border-radius: 10px;
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-size: 0.82rem;
    color: var(--muted);
    transition: all 0.2s;
    background: var(--card);
    position: relative;
  }
  .combine-slot.filled {
    border-style: solid;
    border-color: var(--accent);
    color: var(--text);
    background: var(--card-hover);
  }
  .combine-slot .slot-emoji { font-size: 1.1rem; }
  .combine-slot .clear-slot {
    position: absolute;
    right: 4px;
    top: 4px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--border);
    border: none;
    color: var(--muted);
    font-size: 0.6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .combine-slot .clear-slot:hover { background: #e05555; color: #fff; }
  .combine-plus {
    color: var(--accent);
    font-size: 1.4rem;
    font-weight: 300;
  }
  .combine-btn {
    padding: 0.55rem 1.2rem;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #5b4fcf);
    border: none;
    color: #fff;
    font-size: 0.85rem;
    font-family: 'Raleway', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    opacity: 0.4;
    pointer-events: none;
  }
  .combine-btn.active {
    opacity: 1;
    pointer-events: all;
  }
  .combine-btn.active:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 16px rgba(124,106,247,0.5);
  }
  .combine-btn.loading {
    opacity: 0.7;
    pointer-events: none;
    cursor: wait;
  }

  /* ── RESULT TOAST ── */
  .result-toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem 1.4rem;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .result-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .result-toast.new { border-color: #3a6a3a; background: #12221a; }
  .result-toast .toast-emoji { font-size: 1.4rem; }
  .result-toast .toast-name { font-weight: 600; }
  .result-toast .toast-badge {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--new-text);
    background: var(--new-badge);
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }

  /* ── EMPTY STATE ── */
  .canvas-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    text-align: center;
    color: var(--muted);
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .canvas-hint .hint-icon { font-size: 3rem; margin-bottom: 0.8rem; opacity: 0.4; }
  .canvas-hint p { font-size: 0.85rem; line-height: 1.7; }
  .canvas-hint strong { color: var(--accent); }

  /* ── ANIMATIONS ── */
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }

  @keyframes sparkle {
    0% { opacity: 1; transform: scale(0) translate(0,0); }
    100% { opacity: 0; transform: scale(1) translate(var(--tx), var(--ty)); }
  }
  .spark {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    animation: sparkle 0.6s ease-out forwards;
  }

  /* ── LOADING DOTS ── */
  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }
  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }
</style>
</head>
<body>

<header>
  <h1>✨ Endless Alchemy</h1>
  <div class="header-info">
    <div class="stat">Elements: <span id="elementCount">4</span></div>
    <div class="stat">Combinations: <span id="comboCount">0</span></div>
    <button class="reset-btn" onclick="resetGame()">↺ Reset</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Discovered</span>
      <span class="count" id="sidebarCount">4</span>
    </div>
    <div class="sidebar-search">
      <input type="search" id="sidebarSearch" placeholder="Search elements…" oninput="filterSidebar()"/>
    </div>
    <div class="elements-list" id="elementsList"></div>
  </div>

  <div class="canvas-area">
    <div id="canvas">
      <div class="canvas-hint" id="canvasHint">
        <div class="hint-icon">⚗️</div>
        <p>Drag elements from the left panel onto the canvas.<br/>
        <strong>Drop one element onto another</strong> to combine them,<br/>
        or use the combination bar below.</p>
      </div>
    </div>

    <!-- Combination bar -->
    <div class="combine-zone" id="combineZone">
      <div class="combine-slot" id="slot1" ondragover="e=>e.preventDefault()">
        <span id="slot1content">Drop element</span>
      </div>
      <div class="combine-plus">+</div>
      <div class="combine-slot" id="slot2" ondragover="e=>e.preventDefault()">
        <span id="slot2content">Drop element</span>
      </div>
      <button class="combine-btn" id="combineBtn" onclick="triggerCombine()">
        Combine ✦
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="result-toast" id="resultToast">
  <span class="toast-emoji" id="toastEmoji"></span>
  <span class="toast-name" id="toastName"></span>
  <span class="toast-badge" id="toastBadge" style="display:none">New!</span>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const STARTER = [
  { name: 'Fire',  emoji: '🔥' },
  { name: 'Water', emoji: '💧' },
  { name: 'Earth', emoji: '🌍' },
  { name: 'Wind',  emoji: '💨' },
];

let discovered = {};   // name -> { name, emoji, isNew }
let combinations = {}; // "A+B" -> { name, emoji }
let combineCount = 0;
let slot1 = null, slot2 = null;
let canvasItems = [];
let zCounter = 100;

// ── INIT ───────────────────────────────────────────────────────────────────
function initGame() {
  discovered = {};
  combinations = {};
  combineCount = 0;
  canvasItems = [];
  slot1 = null; slot2 = null;
  document.getElementById('canvas').innerHTML = `
    <div class="canvas-hint" id="canvasHint">
      <div class="hint-icon">⚗️</div>
      <p>Drag elements from the left panel onto the canvas.<br/>
      <strong>Drop one element onto another</strong> to combine them,<br/>
      or use the combination bar below.</p>
    </div>`;
  STARTER.forEach(e => addDiscovered(e.name, e.emoji, false));
  updateStats();
  updateSlotUI();
}

function resetGame() {
  if (!confirm('Reset all progress?')) return;
  initGame();
}

// ── DISCOVERED ─────────────────────────────────────────────────────────────
function addDiscovered(name, emoji, isNew = true) {
  if (!discovered[name]) {
    discovered[name] = { name, emoji, isNew };
    renderSidebar();
    updateStats();
  }
}

function renderSidebar() {
  const q = (document.getElementById('sidebarSearch').value || '').toLowerCase();
  const list = document.getElementById('elementsList');
  const items = Object.values(discovered)
    .filter(e => !q || e.name.toLowerCase().includes(q))
    .sort((a,b) => a.name.localeCompare(b.name));

  list.innerHTML = items.map(e => `
    <div class="element-chip ${e.isNew ? 'new-item' : ''}"
         draggable="true"
         ondragstart="sidebarDragStart(event,'${e.name}','${e.emoji}')"
         onclick="addToCanvas('${e.name}','${e.emoji}')">
      <span class="emoji">${e.emoji}</span>
      <span class="label">${e.name}</span>
      ${e.isNew ? '<span class="new-badge">New</span>' : ''}
    </div>`).join('');

  document.getElementById('sidebarCount').textContent = Object.keys(discovered).length;
}

function filterSidebar() { renderSidebar(); }

// ── CANVAS ITEMS ───────────────────────────────────────────────────────────
function addToCanvas(name, emoji, x, y) {
  const canvas = document.getElementById('canvas');
  const hint = document.getElementById('canvasHint');
  if (hint) hint.style.opacity = '0';

  const id = 'ci_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const cx = x || Math.random() * (canvas.clientWidth - 200) + 60;
  const cy = y || Math.random() * (canvas.clientHeight - 200) + 60;

  const el = document.createElement('div');
  el.className = 'canvas-item pop-in';
  el.id = id;
  el.style.left = cx + 'px';
  el.style.top  = cy + 'px';
  el.style.zIndex = ++zCounter;
  el.innerHTML = `
    <span class="c-emoji">${emoji}</span>
    <span class="c-label">${name}</span>
    <button class="c-delete" onclick="removeCanvasItem('${id}')" title="Remove">✕</button>`;

  el.dataset.name = name;
  el.dataset.emoji = emoji;

  makeDraggable(el);
  canvas.appendChild(el);
  canvasItems.push({ id, name, emoji, el });
  return id;
}

function removeCanvasItem(id) {
  const idx = canvasItems.findIndex(c => c.id === id);
  if (idx !== -1) canvasItems.splice(idx, 1);
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ── DRAGGING ───────────────────────────────────────────────────────────────
function makeDraggable(el) {
  let ox, oy, isDragging = false;

  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('c-delete')) return;
    isDragging = true;
    ox = e.clientX - el.getBoundingClientRect().left;
    oy = e.clientY - el.getBoundingClientRect().top;
    el.classList.add('dragging');
    el.style.zIndex = ++zCounter;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const canvas = document.getElementById('canvas');
    const cr = canvas.getBoundingClientRect();
    let nx = e.clientX - cr.left - ox;
    let ny = e.clientY - cr.top  - oy;
    nx = Math.max(0, Math.min(nx, cr.width  - el.offsetWidth));
    ny = Math.max(0, Math.min(ny, cr.height - el.offsetHeight));
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
  });

  document.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;
    el.classList.remove('dragging');
    checkProximityMerge(el);
  });
}

function checkProximityMerge(el) {
  const r1 = el.getBoundingClientRect();
  for (const ci of canvasItems) {
    if (ci.id === el.id) continue;
    const other = document.getElementById(ci.id);
    if (!other) continue;
    const r2 = other.getBoundingClientRect();
    const overlap = !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
    if (overlap) {
      const a = canvasItems.find(c => c.id === el.id);
      if (!a) continue;
      // animate both
      el.classList.add('combining');
      other.classList.add('combining');
      setTimeout(() => {
        el.classList.remove('combining');
        other.classList.remove('combining');
      }, 500);
      setSlotElement(1, a.name, a.emoji);
      setSlotElement(2, ci.name, ci.emoji);
      triggerCombine();
      return;
    }
  }
}

// ── SIDEBAR DRAG ────────────────────────────────────────────────────────────
let sidebarDragData = null;

function sidebarDragStart(e, name, emoji) {
  sidebarDragData = { name, emoji };
  e.dataTransfer.effectAllowed = 'copy';
}

document.addEventListener('dragover', e => {
  const canvas = document.getElementById('canvas');
  if (canvas.contains(e.target) || e.target === canvas) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  }
});

document.addEventListener('drop', e => {
  if (!sidebarDragData) return;
  const canvas = document.getElementById('canvas');
  if (canvas.contains(e.target) || e.target === canvas) {
    const cr = canvas.getBoundingClientRect();
    addToCanvas(sidebarDragData.name, sidebarDragData.emoji,
      e.clientX - cr.left - 50, e.clientY - cr.top - 20);
  }
  sidebarDragData = null;
});

// ── COMBINE SLOTS ──────────────────────────────────────────────────────────
function setSlotElement(slot, name, emoji) {
  if (slot === 1) slot1 = { name, emoji };
  else slot2 = { name, emoji };
  updateSlotUI();
}

function clearSlot(slot) {
  if (slot === 1) slot1 = null;
  else slot2 = null;
  updateSlotUI();
}

function updateSlotUI() {
  const s1 = document.getElementById('slot1');
  const s2 = document.getElementById('slot2');
  const btn = document.getElementById('combineBtn');
  const zone = document.getElementById('combineZone');

  s1.innerHTML = slot1
    ? `<span class="slot-emoji">${slot1.emoji}</span> ${slot1.name}
       <button class="clear-slot" onclick="clearSlot(1)">✕</button>`
    : `<span id="slot1content" style="font-size:0.8rem;color:var(--muted)">Drop here</span>`;
  s1.classList.toggle('filled', !!slot1);

  s2.innerHTML = slot2
    ? `<span class="slot-emoji">${slot2.emoji}</span> ${slot2.name}
       <button class="clear-slot" onclick="clearSlot(2)">✕</button>`
    : `<span id="slot2content" style="font-size:0.8rem;color:var(--muted)">Drop here</span>`;
  s2.classList.toggle('filled', !!slot2);

  const ready = !!(slot1 && slot2);
  btn.classList.toggle('active', ready);
  zone.classList.toggle('ready', ready);
}

// Drop onto slots
document.addEventListener('DOMContentLoaded', () => {
  ['slot1','slot2'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.addEventListener('dragover', e => e.preventDefault());
    el.addEventListener('drop', e => {
      e.preventDefault();
      if (sidebarDragData) {
        setSlotElement(i+1, sidebarDragData.name, sidebarDragData.emoji);
        sidebarDragData = null;
      }
    });
  });
});

// ── API COMBINE ────────────────────────────────────────────────────────────
async function triggerCombine() {
  if (!slot1 || !slot2) return;
  const btn = document.getElementById('combineBtn');
  const key = [slot1.name, slot2.name].sort().join('+');
  const a = { ...slot1 }, b = { ...slot2 };

  // Check cache
  if (combinations[key]) {
    const res = combinations[key];
    showResult(res.name, res.emoji, false);
    return;
  }

  btn.classList.remove('active');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="loading-dots">Combining</span>';

  try {
    const result = await callAPI(a.name, a.emoji, b.name, b.emoji);
    combinations[key] = result;
    combineCount++;
    const isNew = !discovered[result.name];
    addDiscovered(result.name, result.emoji, isNew);
    showResult(result.name, result.emoji, isNew);
    spawnParticles();
    // Add to canvas near center
    const canvas = document.getElementById('canvas');
    const cx = canvas.clientWidth  / 2 - 60 + (Math.random()-0.5)*100;
    const cy = canvas.clientHeight / 2 - 30 + (Math.random()-0.5)*80;
    addToCanvas(result.name, result.emoji, cx, cy);
    updateStats();
  } catch(err) {
    showToast('❌', 'API Error', false);
    console.error(err);
  }

  btn.innerHTML = 'Combine ✦';
  btn.classList.remove('loading');
  clearSlot(1); clearSlot(2);
}

async function callAPI(nameA, emojiA, nameB, emojiB) {
  const prompt = `You are the game engine for an element-combination crafting game (like Little Alchemy or Infinite Craft).

The player combined: "${nameA}" ${emojiA} + "${nameB}" ${emojiB}

Rules:
- Return ONE new element that logically or creatively results from this combination
- Be imaginative but sensible (e.g. Fire + Water = Steam, Earth + Wind = Dust, Fire + Earth = Lava)
- The result can be anything: objects, concepts, creatures, phenomena, foods, materials, etc.
- Make surprising, delightful combinations when possible
- ALWAYS return ONLY valid JSON, no markdown, no extra text

Return this exact JSON format:
{"name":"ElementName","emoji":"🔥"}

The emoji must be a single emoji character that best represents the result.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 100,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) throw new Error(`API ${response.status}`);
  const data = await response.json();
  const text = data.content.map(b => b.text || '').join('').trim();
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer;
function showResult(name, emoji, isNew) {
  const toast = document.getElementById('resultToast');
  document.getElementById('toastEmoji').textContent = emoji;
  document.getElementById('toastName').textContent = name;
  const badge = document.getElementById('toastBadge');
  badge.style.display = isNew ? 'inline' : 'none';
  toast.className = 'result-toast show' + (isNew ? ' new' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

function showToast(emoji, msg) {
  const toast = document.getElementById('resultToast');
  document.getElementById('toastEmoji').textContent = emoji;
  document.getElementById('toastName').textContent = msg;
  document.getElementById('toastBadge').style.display = 'none';
  toast.className = 'result-toast show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── PARTICLES ──────────────────────────────────────────────────────────────
function spawnParticles() {
  const colors = ['#7c6af7','#f7a26a','#f5c842','#7fff7f','#ff7fc0'];
  const zone = document.getElementById('combineZone').getBoundingClientRect();
  const cx = zone.left + zone.width / 2;
  const cy = zone.top  + zone.height / 2;
  for (let i = 0; i < 12; i++) {
    const sp = document.createElement('div');
    sp.className = 'spark';
    sp.style.left = cx + 'px';
    sp.style.top  = cy + 'px';
    sp.style.background = colors[Math.floor(Math.random() * colors.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist  = 40 + Math.random() * 60;
    sp.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    sp.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 700);
  }
}

// ── STATS ──────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('elementCount').textContent = Object.keys(discovered).length;
  document.getElementById('comboCount').textContent   = combineCount;
}

// ── BOOT ───────────────────────────────────────────────────────────────────
initGame();
</script>
