<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navy Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0a192f;
    color: white;
}

/* Top Navigation */
.navbar {
    display: flex;
    flex-wrap: wrap;
    background-color: #020c1b;
    padding: 10px;
    border-bottom: 1px solid #112240;
}

.navbar button {
    background: #112240;
    border: none;
    color: white;
    padding: 10px 14px;
    margin: 5px;
    cursor: pointer;
    transition: 0.2s;
}

.navbar button:hover {
    background: #1d3a5f;
}

/* Frame container */
.container {
    width: 100%;
    height: calc(100vh - 60px);
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: black;
}
</style>
</head>

<body>

<div class="navbar">
    <button onclick="loadSite('https://sites.google.com/view/unblockedgames77')">UG 77</button>
    <button onclick="loadSite('https://classroom6x.org/')">Classroom 6x</button>
    <button onclick="loadSite('https://unblockedgameswtf.gitlab.io/')">UG WTF</button>
    <button onclick="loadSite('https://66games.io/')">66 Games</button>
    <button onclick="loadSite('https://ubg100.github.io/')">UBG 100</button>
    <button onclick="loadSite('https://ubg44.github.io/')">UBG 44</button>
    <button onclick="loadSite('https://ubg365.github.io/')">UBG 365</button>
    <button onclick="loadSite('https://sites.google.com/view/classroom-6x/')">Alt 6x</button>
    <button onclick="loadSite('https://mathstudyhub.github.io/')">Math Hub</button>
    <button onclick="loadSite('https://szvycentral.github.io/')">Szvy Central</button>
</div>

<div class="container">
    <iframe id="frame" src=""></iframe>
</div>

<script>
function loadSite(url) {
    document.getElementById("frame").src = url;
}
</script>

</body>
</html>
