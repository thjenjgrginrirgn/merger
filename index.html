<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1f;
    color: white;
}

header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

#search {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

.row {
    padding: 20px;
}

.row h2 {
    margin-bottom: 10px;
}

.games {
    display: flex;
    overflow-x: auto;
    gap: 15px;
}

.card {
    min-width: 180px;
    height: 100px;
    background: #1a2238;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.1);
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>🎮 Game Hub</header>

<input id="search" placeholder="Search games..." onkeyup="searchGames()">

<div class="row">
<h2>Featured</h2>
<div class="games" id="gameList"></div>
</div>

<iframe id="player"></iframe>

<script>
const games = [
    {name:"Ludo", url:"https://zv1y2i8p.play.gamezop.com/g/SkhljT2fdgb"},
    {name:"Cricket", url:"https://zv1y2i8p.play.gamezop.com/g/B1e7JkTQp"},
    {name:"Knife Hit", url:"https://zv1y2i8p.play.gamezop.com/g/HyC9a0mdx"},
    {name:"Bubble Shooter", url:"https://zv1y2i8p.play.gamezop.com/g/SJ3TzR2dW"},
    {name:"Chess", url:"https://zv1y2i8p.play.gamezop.com/g/r1xZj0b1Z"}
];

// generate LOTS of games (fake expansion to 300 style)
for(let i=0;i<50;i++){
    games.push({
        name:"Game "+i,
        url:"https://play.gamezop.com/"
    });
}

const container = document.getElementById("gameList");

function render(list){
    container.innerHTML="";
    list.forEach(g=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerText=g.name;
        div.onclick=()=>loadGame(g.url);
        container.appendChild(div);
    });
}

function loadGame(url){
    document.getElementById("player").src=url;
}

function searchGames(){
    let val=document.getElementById("search").value.toLowerCase();
    render(games.filter(g=>g.name.toLowerCase().includes(val)));
}

render(games);
</script>

</body>
</html>
