<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0a192f;
    color: white;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background-color: #020c1b;
    padding: 15px;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}

.sidebar h2 {
    text-align: center;
    color: #64ffda;
}

.btn {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: #112240;
    border: none;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: #1d3a5f;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 10px;
    background: #020c1b;
    text-align: center;
    border-bottom: 1px solid #112240;
}

.viewer {
    position: relative;
    flex: 1;
}

/* iframe */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* fallback overlay */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(10,25,47,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.overlay button {
    padding: 12px 20px;
    background: #64ffda;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Game Hub</h2>

    <button class="btn" onclick="loadSite('https://sites.google.com/view/unblockedgames77')">UG 77</button>
    <button class="btn" onclick="loadSite('https://classroom6x.org/')">Classroom 6x</button>
    <button class="btn" onclick="loadSite('https://unblockedgameswtf.gitlab.io/')">UG WTF</button>
    <button class="btn" onclick="loadSite('https://66games.io/')">66 Games</button>
    <button class="btn" onclick="loadSite('https://ubg100.github.io/')">GitHub Hub</button>

</div>

<div class="main">
    <div class="header" id="title">Select a site</div>

    <div class="viewer">
        <iframe id="frame"></iframe>

        <div class="overlay" id="overlay">
            <h2>Embedding blocked</h2>
            <p>This site does not allow iframe embedding.</p>
            <button onclick="openNewTab()">Open in new tab</button>
        </div>
    </div>
</div>

<script>
let currentURL = "";

function loadSite(url) {
    currentURL = url;

    const frame = document.getElementById("frame");
    const overlay = document.getElementById("overlay");

    overlay.style.display = "none";
    frame.src = url;

    document.getElementById("title").innerText = url;

    // Detect iframe failure
    setTimeout(() => {
        try {
            // If blocked, accessing contentDocument throws error
            let test = frame.contentDocument;
            if (!test) throw "blocked";
        } catch (e) {
            overlay.style.display = "flex";
        }
    }, 2000);
}

function openNewTab() {
    window.open(currentURL, "_blank");
}
</script>

</body>
</html>
